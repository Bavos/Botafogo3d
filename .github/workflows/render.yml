name: Render Botafogo Scene

on:
  push:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "remotion.config.ts"
      - ".github/workflows/render.yml"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run build

      - name: Render video
        run: npm run render

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: botafogo-scene-mp4
          path: out/botafogo-scene.mp4

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/botafogo-scene.mp4
